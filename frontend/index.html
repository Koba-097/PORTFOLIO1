<!DOCTYPE html>
<html lang="pt-br" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
    <h2>Logar</h2>
    <input type="email" id="usuario" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button id="btnLogin">Entrar</button>
    <p id="erro"></p>

    <h3>Ou Cadastrar:</h3>
    <input type="email" id="registroEmail" placeholder="Email">
    <input type="password" id="registroSenha" placeholder="Senha">
     <span id="verSenha" class="olho">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            <circle cx="12" cy="12" r="2.5"/>
        </svg>
    </span>
    <button id="btnRegistrar">Registrar</button>
</div>

    <div id="telaPrincipal" class="tela" style="display:none;">
        <h2>Cadastro de Clientes</h2>

        <form id="formCadastro">
            <input id="nome" placeholder="Nome">

            <div class="grupo-botoes">
                <button type="submit" id="adicionar">Adicionar</button>
                <button type="button" id="limpar">Limpar</button>

            </div>
        </form>

        <input id="busca" placeholder="Buscar" type="text">

        <p id="mensagem"></p>

        <ul id="lista"></ul>
    </div>
<script src="script.js"></script>
</body>
</html>
